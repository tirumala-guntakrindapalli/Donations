name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dashboard-config.js from secrets
        run: |
          cat > dashboard-config.js << 'EOF'
          // Dashboard Configuration - Generated by GitHub Actions
          const DASHBOARD_CONFIG = {
              // Test Mode: false = production (use GitHub), true = local files
              TEST_MODE: false,
              
              // Data Environment: 'prod' for production, 'dev' for development
              // Production deployment always uses prod data folder
              DATA_ENVIRONMENT: 'prod',
              
              // Starting year for dashboard data (all years from this to current will be available)
              START_YEAR: 2024,
              
              // Available Years (dynamically generated: from START_YEAR to current year)
              get AVAILABLE_YEARS() {
                  const currentYear = new Date().getFullYear();
                  const years = [];
                  for (let year = this.START_YEAR; year <= currentYear; year++) {
                      years.push(year);
                  }
                  return years;
              },
              
              // Default Year (current year)
              DEFAULT_YEAR: new Date().getFullYear(),
              
              // Current Selected Year (will be updated dynamically)
              currentYear: new Date().getFullYear(),
              
              // Admin Configuration
              ADMIN_PASSWORD_HASH: '${{ secrets.ADMIN_PASSWORD_HASH }}',
              
              // GitHub Integration (for production mode)
              USE_GITHUB: true,
              GITHUB_TOKEN: '${{ secrets.DONATIONS_PAT }}',
              GITHUB_REPO: '${{ secrets.GITHUB_REPO || github.event.repository.name }}',
              GITHUB_OWNER: '${{ secrets.GITHUB_OWNER || github.repository_owner }}',
              GITHUB_BRANCH: 'main',
              
              // Application Settings
              APP_NAME: 'Vinayaka Chavithi Donations',
              
              // Helper function to get data file path (environment-aware)
              getDataFilePath: function(year) {
                  const env = this.DATA_ENVIRONMENT || 'prod'; // Default to prod in production
                  return `data/${env}/donations-${year}.json`;
              }
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
